# ==============================================================================
# TINAI — Docker Compose Service Definitions
# TODO.md §1.2: api, worker, beat, redis, postgres, dashboard on tinai_net
#
# Key architectural decisions encoded here:
#   • Redis runs with --maxmemory 256mb --maxmemory-policy allkeys-lru
#     (TODO §1.2) — Celery uses DB 1 so MAB keys in DB 0 are evicted last.
#   • No init.sql mount on postgres — schema is owned by Alembic (TODO §1.3).
#   • beat service shares Dockerfile.worker but ONLY runs the scheduler;
#     never runs tasks inline (TODO §1.2).
#   • dashboard intentionally has no dependency on postgres/redis at compose
#     level — it connects at runtime via env vars so it can start independently.
# ==============================================================================

version: "3.9"

# ---------------------------------------------------------------------------
# Shared network — all services communicate by hostname, not IP
# ---------------------------------------------------------------------------
networks:
  tinai_net:
    driver: bridge

# ---------------------------------------------------------------------------
# Named volumes for persistence
# ---------------------------------------------------------------------------
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ---------------------------------------------------------------------------
# Re-usable anchor for API and worker env var blocks (DRY)
# ---------------------------------------------------------------------------
x-common-env: &common-env
  POSTGRES_USER: ${POSTGRES_USER}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: ${POSTGRES_DB}
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  DATABASE_URL: ${DATABASE_URL}
  ALEMBIC_DATABASE_URL: ${ALEMBIC_DATABASE_URL}
  REDIS_URL_MAB: ${REDIS_URL_MAB}
  REDIS_URL_CELERY: ${REDIS_URL_CELERY}
  GROQ_API_KEY: ${GROQ_API_KEY}
  OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
  FALLBACK_API_KEY: ${FALLBACK_API_KEY}
  FALLBACK_MODEL: ${FALLBACK_MODEL}
  FALLBACK_BASE_URL: ${FALLBACK_BASE_URL}
  LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
  LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
  LANGFUSE_HOST: ${LANGFUSE_HOST}
  ARIZE_API_KEY: ${ARIZE_API_KEY}
  ARIZE_SPACE_KEY: ${ARIZE_SPACE_KEY}
  X_API_KEY_SECRET: ${X_API_KEY_SECRET}
  ENVIRONMENT: ${ENVIRONMENT:-dev}
  SAFETY_SAMPLE_RATE: ${SAFETY_SAMPLE_RATE:-0.10}
  MAB_ALPHA: ${MAB_ALPHA:-1.0}
  MAB_BETA: ${MAB_BETA:-0.5}
  MAB_GAMMA: ${MAB_GAMMA:-0.5}
  MAB_EMA_LAMBDA: ${MAB_EMA_LAMBDA:-0.1}
  LLM_TIMEOUT_SECONDS: ${LLM_TIMEOUT_SECONDS:-1.5}
  CACHE_TTL_SECONDS: ${CACHE_TTL_SECONDS:-86400}
  DEFAULT_DAILY_BUDGET_CENTS: ${DEFAULT_DAILY_BUDGET_CENTS:-10000.0000}

services:

  # --------------------------------------------------------------------------
  # postgres — Persistent inference log store (Alembic-owned schema)
  # TODO §1.2: No init.sql mount. Schema drift prevention via versioned migs.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:16
    restart: unless-stopped
    networks:
      - tinai_net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      # Expose to host for local psql/DBeaver access; lock down in prod.
      - "5432:5432"
    healthcheck:
      # Use pg_isready with the container's own env vars (not host-side interpolation).
      # PGPASSWORD prevents a password-prompt hang. -q silences output to avoid log noise.
      test: [ "CMD-SHELL", "PGPASSWORD=$$POSTGRES_PASSWORD pg_isready -q -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1 -p 5432" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # --------------------------------------------------------------------------
  # redis — Control-plane state store + Celery broker
  # TODO §1.2: allkeys-lru policy; DB 0 = MAB/cache/circuit, DB 1 = Celery.
  # 256mb limit keeps this inside Upstash free-tier boundary.
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - tinai_net
    volumes:
      - redis_data:/data
    command: >
      redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes --appendfsync everysec
    ports:
      # Expose to host for redis-cli and RedisInsight; lock down in prod.
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "PING" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # --------------------------------------------------------------------------
  # api — FastAPI data plane (Uvicorn, multi-worker)
  # Sync loop: read Redis → call LLM → return. NO DB writes here.
  # TODO §1.2: depends_on postgres + redis with condition: service_healthy.
  # --------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    networks:
      - tinai_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    ports:
      - "8000:8000"
    # Mount the entire project root at WORKDIR=/app so that:
    #   • alembic init / alembic revision writes (migrations/, alembic.ini)
    #     are immediately visible on the host filesystem.
    #   • Hot-reload of api/ code works without a rebuild.
    # Remove this volume block for prod image builds (COPY in Dockerfile is used instead).
    volumes:
      - .:/app
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # worker — Celery task executor (all async/background work lives here)
  # Handles: DB writes, MAB weight updates, hallucination checks, drift, etc.
  # NEVER called inline from the FastAPI sync loop (tradeoffs-info §1).
  # --------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    networks:
      - tinai_net
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      <<: *common-env
    command: >
      celery -A workers.celery_app worker --loglevel=info --concurrency=4 -E --queues=celery,default,telemetry,safety,drift,budget,cache,observability
    # Full project root so workers can import api.* and workers.* as packages.
    volumes:
      - .:/app
    healthcheck:
      test:
        - "CMD-SHELL"
        - >
          celery -A workers.celery_app inspect ping --timeout 5 --destination celery@$$HOSTNAME || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --------------------------------------------------------------------------
  # beat — Celery Beat periodic task scheduler (runs the scheduler ONLY)
  # Separate from worker intentionally: a single beat process prevents double-
  # firing of periodic tasks when worker count is scaled horizontally.
  # TODO §1.2: depends only on redis (doesn't need healthy postgres to schedule)
  # --------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    restart: unless-stopped
    networks:
      - tinai_net
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *common-env
    command: >
      celery -A workers.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    volumes:
      - .:/app

  # --------------------------------------------------------------------------
  # dashboard — Streamlit Pareto/metrics dashboard
  # Uses psycopg2-binary (sync) intentionally — see TODO §6.1 for rationale.
  # Connects to postgres and redis by hostname at runtime via env vars.
  # --------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: unless-stopped
    networks:
      - tinai_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL_MAB: ${REDIS_URL_MAB}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
    ports:
      - "8501:8501"
    volumes:
      - ./dashboard:/app/dashboard
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8501/_stcore/health || exit 1" ]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
